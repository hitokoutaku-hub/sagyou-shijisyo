<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>作業指示書管理システム｜整備工場</title>
<style>
  :root {
    --bg: #1a1d27; --card: #22263a; --accent: #e8a020; --accent2: #f0c060;
    --text: #f0f0f0; --sub: #8090b0; --border: #333a55; --danger: #e05050;
    --ok: #40b060; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Sans', sans-serif; font-size: 15px; }
  #app { max-width: 900px; margin: 0 auto; padding: 10px; }
  h1 { color: var(--accent); font-size: 18px; padding: 12px 0 6px; text-align: center; letter-spacing: 1px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab { flex: 1; min-width: 80px; padding: 8px 4px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); text-align: center; cursor: pointer; font-size: 13px; color: var(--sub); transition: .2s; }
  .tab.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }

  /* PANELS */
  .panel { display: none; } .panel.active { display: block; }

  /* CARD */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .card h2 { color: var(--accent); font-size: 15px; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  /* FORM */
  label { display: block; color: var(--sub); font-size: 12px; margin-bottom: 3px; margin-top: 10px; }
  input, select, textarea {
    width: 100%; padding: 9px 10px; background: #1a1d27; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 14px; outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  textarea { min-height: 70px; resize: vertical; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* BUTTONS */
  .btn { padding: 10px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: bold; transition: .15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-ok { background: var(--ok); color: #fff; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  /* STATUS BADGE */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
  .badge-入庫中 { background: #2a4a8a; color: #80b0ff; }
  .badge-作業中 { background: #5a3000; color: var(--accent); }
  .badge-完了 { background: #1a4a2a; color: #60d080; }
  .badge-引渡済 { background: #3a3a3a; color: #aaa; }
  .badge-車検中 { background: #4a1a6a; color: #c080ff; }

  /* LIST */
  .order-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px; margin-bottom: 8px; cursor: pointer; transition: .15s; }
  .order-item:hover { border-color: var(--accent); }
  .order-item .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .order-num { color: var(--accent); font-weight: bold; font-size: 15px; }
  .order-info { color: var(--sub); font-size: 13px; }

  /* CHECKLIST */
  .check-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 6px; margin-top: 6px; }
  .check-item { display: flex; align-items: center; gap: 6px; padding: 6px 8px;
    background: #1a1d27; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; font-size: 13px; }
  .check-item.checked { border-color: var(--accent); background: #2a2500; color: var(--accent); }
  .check-item input { width: auto; margin: 0; }

  /* SETTINGS */
  .staff-list { margin-top: 8px; }
  .staff-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--border);
    border-radius: 20px; padding: 4px 12px; margin: 3px; font-size: 13px; }
  .staff-tag button { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 15px; line-height: 1; }

  /* GAS STATUS */
  .gas-status { padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-top: 8px; }
  .gas-ok { background: #1a3a2a; color: #60d080; border: 1px solid #40b060; }
  .gas-err { background: #3a1a1a; color: #ff8080; border: 1px solid var(--danger); }
  .gas-wait { background: #2a2a1a; color: #d0c060; border: 1px solid #a09030; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; overflow-y: auto; }
  .modal-bg.open { display: flex; align-items: flex-start; justify-content: center; padding: 20px; }
  .modal { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 20px; width: 100%; max-width: 600px; margin: auto; }
  .modal h2 { color: var(--accent); margin-bottom: 14px; }

  /* SYNC indicator */
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .sync-on { background: #40b060; }
  .sync-off { background: #888; }

  /* SHAKKEN (車検) */
  .shakken-toggle { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .toggle-sw { position: relative; width: 44px; height: 24px; }
  .toggle-sw input { opacity: 0; width: 0; height: 0; }
  .toggle-sw .slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: .2s; }
  .toggle-sw input:checked + .slider { background: var(--accent); }
  .toggle-sw .slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px;
    background: #fff; border-radius: 50%; transition: .2s; }
  .toggle-sw input:checked + .slider:before { transform: translateX(20px); }

  .work3 { display: flex; gap: 6px; margin-top: 4px; }
  .work3 button { flex: 1; padding: 8px 4px; border: 1px solid var(--border); border-radius: 6px;
    background: #1a1d27; color: var(--sub); cursor: pointer; font-size: 12px; transition: .15s; }
  .work3 button.sel { border-color: var(--accent); background: #2a2500; color: var(--accent); font-weight: bold; }

  @media (max-width: 480px) {
    .row2 { grid-template-columns: 1fr; }
    .check-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  }

  .loading { text-align: center; color: var(--sub); padding: 30px; }
  .empty { text-align: center; color: var(--sub); padding: 30px; font-size: 14px; }
</style>
</head>
<body>
<div id="app">
  <h1>🔧 整備作業指示書</h1>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('new')">📝 新規作成</div>
    <div class="tab" onclick="switchTab('list')">📋 一覧</div>
    <div class="tab" onclick="switchTab('shakken')">🔍 車検</div>
    <div class="tab" onclick="switchTab('settings')">⚙️ 項目管理</div>
  </div>

  <!-- 新規作成 -->
  <div class="panel active" id="panel-new">
    <div class="card">
      <h2>基本情報</h2>
      <div class="row2">
        <div>
          <label>指示書番号</label>
          <input id="orderNum" placeholder="例: 2025-001" />
        </div>
        <div>
          <label>ステータス</label>
          <select id="status">
            <option value="入庫中">入庫中</option>
            <option value="作業中">作業中</option>
            <option value="完了">完了</option>
            <option value="引渡済">引渡済</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div>
          <label>顧客名</label>
          <input id="custName" placeholder="山田 太郎" />
        </div>
        <div>
          <label>連絡先</label>
          <input id="custPhone" placeholder="090-0000-0000" />
        </div>
      </div>
      <div class="row2">
        <div>
          <label>車名</label>
          <input id="carName" placeholder="トヨタ プリウス" />
        </div>
        <div>
          <label>年式</label>
          <input id="carYear" placeholder="2020年" />
        </div>
      </div>
      <div>
        <label>ナンバー</label>
        <input id="carPlate" placeholder="大阪 300 あ 1234" />
      </div>
      <div class="row2">
        <div>
          <label>入庫日</label>
          <input type="date" id="dateIn" />
        </div>
        <div>
          <label>出庫予定日</label>
          <input type="date" id="dateOut" />
        </div>
      </div>
      <div class="row2">
        <div>
          <label>担当整備士</label>
          <select id="mechName"><option value="">選択してください</option></select>
        </div>
        <div>
          <label>受付担当</label>
          <select id="receptionName"><option value="">選択してください</option></select>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>依頼事項</h2>
      <div class="check-grid" id="check-request"></div>
    </div>
    <div class="card">
      <h2>気がついた事</h2>
      <div class="check-grid" id="check-notice"></div>
    </div>
    <div class="card">
      <h2>予防整備</h2>
      <div class="check-grid" id="check-prevent"></div>
    </div>
    <div class="card">
      <h2>作業内容</h2>
      <div class="check-grid" id="check-work"></div>
    </div>

    <div class="card">
      <h2>備考</h2>
      <textarea id="remarks" placeholder="その他メモ..."></textarea>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveOrder()">💾 保存</button>
      <button class="btn" style="background:var(--border)" onclick="clearForm()">🗑️ クリア</button>
    </div>
  </div>

  <!-- 一覧 -->
  <div class="panel" id="panel-list">
    <div class="card" style="padding:10px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="date" id="filterDate" style="flex:1;min-width:130px" onchange="loadList()" />
        <button class="btn btn-sm" style="background:var(--border)" onclick="document.getElementById('filterDate').value='';loadList()">全件</button>
        <button class="btn btn-sm btn-primary" onclick="loadList()">🔄 更新</button>
        <span id="syncIndicator"><span class="sync-dot sync-off"></span>ローカル</span>
      </div>
    </div>
    <div id="orderList"><div class="loading">読み込み中...</div></div>
  </div>

  <!-- 車検 -->
  <div class="panel" id="panel-shakken">
    <div class="card">
      <h2>基本情報</h2>
      <div class="row2">
        <div>
          <label>指示書番号</label>
          <input id="sk-orderNum" placeholder="例: 車検-2025-001" />
        </div>
        <div>
          <label>ステータス</label>
          <select id="sk-status">
            <option value="車検中">車検中</option>
            <option value="完了">完了</option>
            <option value="引渡済">引渡済</option>
          </select>
        </div>
      </div>
      <div class="row2">
        <div><label>顧客名</label><input id="sk-custName" /></div>
        <div><label>連絡先</label><input id="sk-custPhone" /></div>
      </div>
      <div class="row2">
        <div><label>車名</label><input id="sk-carName" /></div>
        <div><label>ナンバー</label><input id="sk-carPlate" /></div>
      </div>
      <div class="row2">
        <div><label>車検入庫日</label><input type="date" id="sk-dateIn" /></div>
        <div><label>車検満了日</label><input type="date" id="sk-dateOut" /></div>
      </div>
      <div class="row2">
        <div>
          <label>担当整備士</label>
          <select id="sk-mechName"><option value="">選択してください</option></select>
        </div>
        <div>
          <label>受付担当</label>
          <select id="sk-receptionName"><option value="">選択してください</option></select>
        </div>
      </div>
    </div>

    <div class="card" id="sk-items-card">
      <h2>車検項目</h2>
      <div id="sk-items"></div>
    </div>

    <div class="card">
      <h2>備考</h2>
      <textarea id="sk-remarks"></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveShakken()">💾 保存</button>
      <button class="btn" style="background:var(--border)" onclick="clearShakken()">🗑️ クリア</button>
    </div>
  </div>

  <!-- 設定 -->
  <div class="panel" id="panel-settings">
    <div class="card">
      <h2>👤 スタッフ登録</h2>
      <label>名前を追加</label>
      <div style="display:flex;gap:8px">
        <input id="newStaff" placeholder="スタッフ名" style="flex:1" onkeydown="if(event.key==='Enter')addStaff()" />
        <button class="btn btn-primary btn-sm" onclick="addStaff()">追加</button>
      </div>
      <div class="staff-list" id="staffList"></div>
    </div>

    <div class="card">
      <h2>📋 チェック項目管理</h2>
      <div id="itemSettings"></div>
    </div>

    <div class="card">
      <h2>🔍 車検項目管理</h2>
      <div id="shakkenItemSettings"></div>
    </div>

    <div class="card">
      <h2>☁️ Googleスプレッドシート連携</h2>
      <p style="color:var(--sub);font-size:13px;margin-bottom:8px">GASデプロイURLを入力すると、全端末でデータを共有できます</p>
      <input id="gasUrl" placeholder="https://script.google.com/macros/s/..." />
      <div class="btn-row">
        <button class="btn btn-primary btn-sm" onclick="saveGasUrl()">URLを保存</button>
        <button class="btn btn-sm" style="background:var(--border)" onclick="testGas()">接続テスト</button>
        <button class="btn btn-sm btn-danger" onclick="clearGasUrl()">削除</button>
      </div>
      <div id="gasStatus"></div>
      <p style="color:var(--sub);font-size:11px;margin-top:8px">※ GAS連携なしでもローカル保存で使用できます</p>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <h2 id="modalTitle">作業指示書</h2>
    <div id="modalContent"></div>
    <div class="btn-row">
      <button class="btn btn-primary btn-sm" onclick="sendLine()">📤 LINEで送る</button>
      <button class="btn btn-sm" style="background:var(--border)" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<script>
// ========== STATE ==========
const DEFAULT_ITEMS = {
  request: ['オイル交換','オイルフィルター','タイヤ交換','タイヤローテーション','バッテリー交換','エアフィルター','ブレーキパッド','ウォッシャー液','エアコンフィルター','車検'],
  notice: ['オイル漏れ','冷却水漏れ','ブレーキ鳴き','タイヤ偏摩耗','バッテリー弱','ベルト劣化','ワイパー劣化','灯火類不良'],
  prevent: ['タイミングベルト','スパークプラグ','冷却水交換','ブレーキフルード','ATF交換','パワステフルード','エアコンガス補充'],
  work: ['オイル交換完了','フィルター交換完了','タイヤ交換完了','バッテリー交換完了','ブレーキパッド交換','点検整備完了','試運転OK']
};
const DEFAULT_SK_ITEMS = [
  {label:'エンジンオイル', req:true, work:'交換/補充/良好'},
  {label:'冷却水', req:true, work:'交換/補充/良好'},
  {label:'ブレーキフルード', req:true, work:'交換/補充/良好'},
  {label:'ブレーキパッド前', req:true, work:'交換/要観察/良好'},
  {label:'ブレーキパッド後', req:true, work:'交換/要観察/良好'},
  {label:'タイヤ前', req:true, work:'交換/要観察/良好'},
  {label:'タイヤ後', req:true, work:'交換/要観察/良好'},
  {label:'バッテリー', req:true, work:'交換/要観察/良好'},
  {label:'エアフィルター', req:false, work:'交換/良好'},
  {label:'ワイパーゴム', req:false, work:'交換/良好'},
  {label:'ライト類', req:true, work:'交換/良好'},
  {label:'下回り点検', req:true, work:'異常あり/良好'},
];

let state = {
  staff: [],
  items: {...DEFAULT_ITEMS},
  skItems: [],
  gasUrl: '',
  orders: [],       // local orders
  checkState: {request:{}, notice:{}, prevent:{}, work:{}},
  skCheckState: {},  // shakken item states {label: {req, work}}
  currentOrder: null,
};

function loadState() {
  try {
    const s = localStorage.getItem('ws_state');
    if (s) {
      const parsed = JSON.parse(s);
      state = {...state, ...parsed};
      // merge defaults for missing keys
      for (const k of Object.keys(DEFAULT_ITEMS)) {
        if (!state.items[k]) state.items[k] = DEFAULT_ITEMS[k];
      }
      if (!state.skItems || !state.skItems.length) state.skItems = DEFAULT_SK_ITEMS;
    } else {
      state.skItems = DEFAULT_SK_ITEMS;
    }
  } catch(e) { state.skItems = DEFAULT_SK_ITEMS; }
}

function saveState() {
  localStorage.setItem('ws_state', JSON.stringify(state));
}

// ========== TABS ==========
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['new','list','shakken','settings'][i]===tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if (tab==='list') loadList();
  if (tab==='settings') renderSettings();
  if (tab==='shakken') renderShakkenItems();
}

// ========== CHECKLIST ==========
function renderChecklist(section, containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  (state.items[section]||[]).forEach(label => {
    const checked = state.checkState[section]?.[label] || false;
    const div = document.createElement('div');
    div.className = 'check-item' + (checked ? ' checked' : '');
    div.innerHTML = `<span>${checked?'✅':'⬜'}</span><span>${label}</span>`;
    div.onclick = () => {
      state.checkState[section] = state.checkState[section] || {};
      state.checkState[section][label] = !state.checkState[section][label];
      renderChecklist(section, containerId);
    };
    container.appendChild(div);
  });
}

function renderAllChecklists() {
  renderChecklist('request','check-request');
  renderChecklist('notice','check-notice');
  renderChecklist('prevent','check-prevent');
  renderChecklist('work','check-work');
}

// ========== SHAKKEN ITEMS ==========
function renderShakkenItems() {
  const container = document.getElementById('sk-items');
  if (!container) return;
  container.innerHTML = '';
  (state.skItems||[]).forEach((item, idx) => {
    const st = state.skCheckState[item.label] || {req: item.req, work: ''};
    const workOpts = (item.work||'').split('/');
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);flex-wrap:wrap';
    
    const reqHtml = item.req ? `<span style="color:var(--danger);font-size:11px">必須</span>` : `<span style="color:var(--sub);font-size:11px">任意</span>`;
    
    let workBtns = workOpts.map(opt => 
      `<button class="work3-btn${st.work===opt?' sel':''}" data-idx="${idx}" data-opt="${opt}" onclick="setSkWork(${idx},'${opt}')" style="padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:${st.work===opt?'#2a2500':'#1a1d27'};color:${st.work===opt?'var(--accent)':'var(--sub)'};cursor:pointer;font-size:12px">${opt}</button>`
    ).join('');

    div.innerHTML = `<span style="flex:1;font-size:13px">${reqHtml} ${item.label}</span><div style="display:flex;gap:4px;flex-wrap:wrap">${workBtns}</div>`;
    container.appendChild(div);
  });
}

function setSkWork(idx, opt) {
  const item = state.skItems[idx];
  state.skCheckState[item.label] = state.skCheckState[item.label] || {};
  state.skCheckState[item.label].work = opt;
  renderShakkenItems();
}

// ========== STAFF ==========
function renderStaff() {
  const list = document.getElementById('staffList');
  if (!list) return;
  list.innerHTML = state.staff.map((s,i) => 
    `<span class="staff-tag">${s}<button onclick="removeStaff(${i})">×</button></span>`
  ).join('');
  // update selects
  ['mechName','receptionName','sk-mechName','sk-receptionName'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const cur = sel.value;
    sel.innerHTML = '<option value="">選択してください</option>' + 
      state.staff.map(s=>`<option value="${s}"${s===cur?' selected':''}>${s}</option>`).join('');
  });
}

function addStaff() {
  const inp = document.getElementById('newStaff');
  const name = inp.value.trim();
  if (!name || state.staff.includes(name)) return;
  state.staff.push(name);
  inp.value = '';
  saveState();
  renderStaff();
}

function removeStaff(i) {
  state.staff.splice(i,1);
  saveState();
  renderStaff();
}

// ========== SETTINGS RENDER ==========
function renderSettings() {
  renderStaff();
  
  // check items
  const container = document.getElementById('itemSettings');
  const sectionNames = {request:'依頼事項', notice:'気がついた事', prevent:'予防整備', work:'作業内容'};
  container.innerHTML = Object.keys(sectionNames).map(sec => `
    <div style="margin-bottom:14px">
      <div style="color:var(--accent);font-size:13px;margin-bottom:6px">${sectionNames[sec]}</div>
      <div style="display:flex;gap:6px;margin-bottom:6px">
        <input id="newItem-${sec}" placeholder="新しい項目" style="flex:1" onkeydown="if(event.key==='Enter')addItem('${sec}')" />
        <button class="btn btn-primary btn-sm" onclick="addItem('${sec}')">追加</button>
      </div>
      <div id="items-${sec}" style="display:flex;flex-wrap:wrap;gap:4px">
        ${(state.items[sec]||[]).map((item,i)=>`<span class="staff-tag">${item}<button onclick="removeItem('${sec}',${i})">×</button></span>`).join('')}
      </div>
    </div>
  `).join('');

  // shakken items settings
  const skContainer = document.getElementById('shakkenItemSettings');
  skContainer.innerHTML = `
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <input id="newSkItem" placeholder="新しい車検項目" style="flex:1" />
      <button class="btn btn-primary btn-sm" onclick="addSkItem()">追加</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">
      ${(state.skItems||[]).map((item,i)=>`<span class="staff-tag">${item.label}<button onclick="removeSkItem(${i})">×</button></span>`).join('')}
    </div>
  `;

  // GAS URL
  document.getElementById('gasUrl').value = state.gasUrl || '';
  updateSyncIndicator();
}

function addItem(sec) {
  const inp = document.getElementById('newItem-'+sec);
  const val = inp.value.trim();
  if (!val) return;
  state.items[sec] = state.items[sec] || [];
  state.items[sec].push(val);
  inp.value = '';
  saveState();
  renderSettings();
  renderAllChecklists();
}

function removeItem(sec, i) {
  state.items[sec].splice(i,1);
  saveState();
  renderSettings();
  renderAllChecklists();
}

function addSkItem() {
  const inp = document.getElementById('newSkItem');
  const val = inp.value.trim();
  if (!val) return;
  state.skItems.push({label:val, req:false, work:'良好/要観察/交換'});
  inp.value = '';
  saveState();
  renderSettings();
}

function removeSkItem(i) {
  state.skItems.splice(i,1);
  saveState();
  renderSettings();
}

// ========== GAS ==========
function saveGasUrl() {
  const url = document.getElementById('gasUrl').value.trim();
  state.gasUrl = url;
  saveState();
  updateSyncIndicator();
  showGasStatus(url ? 'URLを保存しました' : 'URLを削除しました', url ? 'wait' : 'err');
}

function clearGasUrl() {
  state.gasUrl = '';
  document.getElementById('gasUrl').value = '';
  saveState();
  updateSyncIndicator();
  showGasStatus('GAS連携を無効にしました', 'err');
}

function updateSyncIndicator() {
  const el = document.getElementById('syncIndicator');
  if (!el) return;
  const on = !!state.gasUrl;
  el.innerHTML = `<span class="sync-dot ${on?'sync-on':'sync-off'}"></span>${on?'クラウド同期':'ローカル'}`;
}

function showGasStatus(msg, type) {
  const el = document.getElementById('gasStatus');
  if (!el) return;
  el.className = 'gas-status gas-' + (type==='ok'?'ok':type==='err'?'err':'wait');
  el.textContent = msg;
  el.style.display = 'block';
}

async function testGas() {
  if (!state.gasUrl) { showGasStatus('先にURLを保存してください', 'err'); return; }
  showGasStatus('接続テスト中...', 'wait');
  try {
    // GASはCORSの制限があるためno-corsで送信テスト
    const url = state.gasUrl + '?action=list';
    const res = await fetch(url, { method: 'GET', mode: 'no-cors' });
    // no-corsの場合はopaqueレスポンスなので成功とみなす
    showGasStatus('✅ 接続成功！（GASサーバーに到達しました）', 'ok');
    saveState();
  } catch(e) {
    showGasStatus('❌ 接続失敗: ' + e.message, 'err');
  }
}

// GASにデータ送信（no-corsのため結果は取得不可だがデータは届く）
async function sendToGas(action, data) {
  if (!state.gasUrl) return false;
  try {
    await fetch(state.gasUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action, ...data})
    });
    return true;
  } catch(e) {
    console.log('GAS送信エラー:', e);
    return false;
  }
}

// ========== ORDER SAVE ==========
function getCheckedItems(section) {
  return Object.entries(state.checkState[section]||{})
    .filter(([,v])=>v).map(([k])=>k);
}

async function saveOrder() {
  const order = {
    id: Date.now().toString(),
    orderNum: document.getElementById('orderNum').value,
    status: document.getElementById('status').value,
    custName: document.getElementById('custName').value,
    custPhone: document.getElementById('custPhone').value,
    carName: document.getElementById('carName').value,
    carYear: document.getElementById('carYear').value,
    carPlate: document.getElementById('carPlate').value,
    dateIn: document.getElementById('dateIn').value,
    dateOut: document.getElementById('dateOut').value,
    mechName: document.getElementById('mechName').value,
    receptionName: document.getElementById('receptionName').value,
    remarks: document.getElementById('remarks').value,
    requestItems: getCheckedItems('request'),
    noticeItems: getCheckedItems('notice'),
    preventItems: getCheckedItems('prevent'),
    workItems: getCheckedItems('work'),
    savedAt: new Date().toLocaleString('ja-JP'),
    type: 'normal'
  };

  if (!order.custName && !order.carName) {
    alert('顧客名か車名を入力してください');
    return;
  }

  // ローカル保存
  state.orders.unshift(order);
  saveState();

  // GAS送信
  if (state.gasUrl) {
    const ok = await sendToGas('save', {order});
    alert(ok ? '✅ 保存しました（クラウドにも送信）' : '✅ ローカルに保存しました\n（GASへの送信は確認できません）');
  } else {
    alert('✅ 保存しました');
  }

  clearForm();
}

function clearForm() {
  ['orderNum','custName','custPhone','carName','carYear','carPlate','dateIn','dateOut','remarks'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('status').value = '入庫中';
  document.getElementById('mechName').value = '';
  document.getElementById('receptionName').value = '';
  state.checkState = {request:{}, notice:{}, prevent:{}, work:{}};
  renderAllChecklists();
}

// ========== SHAKKEN SAVE ==========
async function saveShakken() {
  const skResults = {};
  (state.skItems||[]).forEach(item => {
    skResults[item.label] = state.skCheckState[item.label]?.work || '';
  });

  const order = {
    id: Date.now().toString(),
    orderNum: document.getElementById('sk-orderNum').value,
    status: document.getElementById('sk-status').value,
    custName: document.getElementById('sk-custName').value,
    custPhone: document.getElementById('sk-custPhone').value,
    carName: document.getElementById('sk-carName').value,
    carPlate: document.getElementById('sk-carPlate').value,
    dateIn: document.getElementById('sk-dateIn').value,
    dateOut: document.getElementById('sk-dateOut').value,
    mechName: document.getElementById('sk-mechName').value,
    receptionName: document.getElementById('sk-receptionName').value,
    remarks: document.getElementById('sk-remarks').value,
    skResults,
    savedAt: new Date().toLocaleString('ja-JP'),
    type: 'shakken'
  };

  state.orders.unshift(order);
  saveState();

  if (state.gasUrl) {
    await sendToGas('save', {order});
  }

  alert('✅ 車検指示書を保存しました');
  clearShakken();
}

function clearShakken() {
  ['sk-orderNum','sk-custName','sk-custPhone','sk-carName','sk-carPlate','sk-dateIn','sk-dateOut','sk-remarks'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  state.skCheckState = {};
  renderShakkenItems();
}

// ========== LIST ==========
function loadList() {
  const container = document.getElementById('orderList');
  const filterDate = document.getElementById('filterDate')?.value;
  
  let orders = [...state.orders];
  if (filterDate) {
    orders = orders.filter(o => o.dateIn === filterDate);
  }

  if (!orders.length) {
    container.innerHTML = '<div class="empty">📋 指示書がありません</div>';
    return;
  }

  container.innerHTML = orders.map(o => `
    <div class="order-item" onclick="showDetail('${o.id}')">
      <div class="top">
        <span class="order-num">${o.orderNum || '（番号なし）'}</span>
        <span class="badge badge-${o.status}">${o.status}</span>
      </div>
      <div class="order-info">
        ${o.type==='shakken'?'🔍 ':''} ${o.custName||''} / ${o.carName||''} ${o.carPlate?'【'+o.carPlate+'】':''}
      </div>
      <div class="order-info" style="margin-top:4px">
        入庫: ${o.dateIn||'未設定'} → 出庫: ${o.dateOut||'未設定'}　担当: ${o.mechName||'未定'}
      </div>
    </div>
  `).join('');
}

// ========== DETAIL MODAL ==========
function showDetail(id) {
  const order = state.orders.find(o => o.id === id);
  if (!order) return;
  state.currentOrder = order;

  document.getElementById('modalTitle').textContent = 
    (order.type==='shakken'?'🔍 車検指示書 ':'📝 作業指示書 ') + (order.orderNum||'');

  let html = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:12px">
      <div><span style="color:var(--sub)">顧客名</span><br>${order.custName||'―'}</div>
      <div><span style="color:var(--sub)">連絡先</span><br>${order.custPhone||'―'}</div>
      <div><span style="color:var(--sub)">車名</span><br>${order.carName||'―'}</div>
      <div><span style="color:var(--sub)">ナンバー</span><br>${order.carPlate||'―'}</div>
      <div><span style="color:var(--sub)">入庫日</span><br>${order.dateIn||'―'}</div>
      <div><span style="color:var(--sub)">出庫予定</span><br>${order.dateOut||'―'}</div>
      <div><span style="color:var(--sub)">担当整備士</span><br>${order.mechName||'―'}</div>
      <div><span style="color:var(--sub)">受付担当</span><br>${order.receptionName||'―'}</div>
    </div>
  `;

  if (order.type === 'shakken' && order.skResults) {
    html += `<div style="font-size:13px;margin-bottom:10px"><strong style="color:var(--accent)">車検結果</strong><br>`;
    Object.entries(order.skResults).forEach(([k,v]) => {
      if (v) html += `<span style="color:var(--sub)">${k}:</span> ${v}　`;
    });
    html += '</div>';
  } else {
    const sections = [
      {key:'requestItems', label:'依頼事項'},
      {key:'noticeItems', label:'気がついた事'},
      {key:'preventItems', label:'予防整備'},
      {key:'workItems', label:'作業内容'},
    ];
    sections.forEach(({key, label}) => {
      const items = order[key];
      if (items && items.length) {
        html += `<div style="margin-bottom:8px;font-size:13px"><strong style="color:var(--accent)">${label}</strong><br>${items.join('、')}</div>`;
      }
    });
  }

  if (order.remarks) {
    html += `<div style="font-size:13px"><strong style="color:var(--accent)">備考</strong><br>${order.remarks}</div>`;
  }

  // ステータス変更
  html += `
    <div style="margin-top:12px">
      <label style="color:var(--sub);font-size:12px">ステータス変更</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:4px">
        ${['入庫中','作業中','完了','引渡済','車検中'].map(s=>
          `<button class="btn btn-sm${order.status===s?' btn-primary':''}" style="${order.status!==s?'background:var(--border)':''}" onclick="changeStatus('${id}','${s}')">${s}</button>`
        ).join('')}
      </div>
    </div>
    <div style="margin-top:10px">
      <button class="btn btn-sm btn-danger" onclick="deleteOrder('${id}')">🗑️ 削除</button>
    </div>
  `;

  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('detailModal').classList.add('open');
}

function changeStatus(id, status) {
  const order = state.orders.find(o => o.id === id);
  if (!order) return;
  order.status = status;
  saveState();
  if (state.gasUrl) sendToGas('update', {order});
  showDetail(id);
  loadList();
}

function deleteOrder(id) {
  if (!confirm('この指示書を削除しますか？')) return;
  state.orders = state.orders.filter(o => o.id !== id);
  saveState();
  closeModal();
  loadList();
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
}

// ========== LINE SHARE ==========
function sendLine() {
  const order = state.currentOrder;
  if (!order) return;
  
  let text = `【作業指示書】${order.orderNum||''}\n`;
  text += `顧客: ${order.custName||''}　TEL: ${order.custPhone||''}\n`;
  text += `車両: ${order.carName||''} ${order.carPlate||''}\n`;
  text += `入庫: ${order.dateIn||''}　出庫予定: ${order.dateOut||''}\n`;
  text += `担当: ${order.mechName||''}　受付: ${order.receptionName||''}\n`;
  
  if (order.type === 'shakken') {
    text += `\n【車検結果】\n`;
    Object.entries(order.skResults||{}).forEach(([k,v]) => {
      if (v) text += `${k}: ${v}\n`;
    });
  } else {
    if (order.requestItems?.length) text += `\n【依頼】${order.requestItems.join('、')}\n`;
    if (order.workItems?.length) text += `【作業】${order.workItems.join('、')}\n`;
  }
  if (order.remarks) text += `\n【備考】${order.remarks}\n`;

  const url = 'https://line.me/R/share?text=' + encodeURIComponent(text);
  window.open(url, '_blank');
}

// ========== INIT ==========
function init() {
  loadState();
  renderAllChecklists();
  renderStaff();
  
  // 今日の日付をデフォルト設定
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('dateIn').value = today;
  document.getElementById('sk-dateIn').value = today;
  
  updateSyncIndicator();
}

init();
</script>
